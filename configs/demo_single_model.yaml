# Stream real HD-EMG from the RRD dataset -> one stub model.
# Trials are sequential recordings, replayed as one continuous stream.
transport:
  kind: inproc

run:
  duration_s: 150.0
  mode: process

# What to stream from the dataset (sources inherit these unless they override).
dataset:
  root: /home/reza/Documents/SampleIntegrationData
  subject: MP301        # MP2xx+ have HD-EMG; MP1xx are bipolar+IMU only
#  days: all             # or [Day_1]
  days: Day_1
  trials: [1,2,3,4]           # or [1, 2, 3] / [Trial_01, Trial_05]
  activities: [1, 2, 2.1, 3, 4]  # stream only these intent classes (BioActLab set)
  include_mvc: false    # skip the MVC calibration block
  loop: true

# Real activity names are unknown in BioActLab/HDF5 (only codes). Fill them here
# and they flow to predictions, ground-truth display and dataset_info.
# activity_names: { 1: stand, 2: walk, 2.1: walk_turn, 3: stairs_up, 4: stairs_down }

sources:
  - id: hd_emg
    modality: hd_emg    # -> param EMG_Right_MA, (T,4,16) reshaped to 64 ch
    chunk_size: 100     # 100 samples @ 1 kHz = 10 ms per frame
    generator: rrd_replay

models:
  - id: stub_lstm
    type: stub
    active: true
    # class space inherited from dataset.activities -> num_classes & labels auto.
    inputs: [hd_emg]
    window: { window_size: 100, hop: 50 }
    infer_rate_hz: 20
    device: cpu
    options: { mode: energy }
