# Single model — CustomResNet on HD-EMG
# Checkpoint: SWAG-TrainedModels/Integration_models/HD_EMG/CustomResNet_.../100/
transport:
  kind: inproc

run:
  duration_s: 8.0
  mode: process

dataset:
  # root: set via RRD_ROOT env var
  subject: MP301
  days: Day_1
  trials: [1, 2, 3, 4]
  activities: [1, 2, 2.1, 3, 4]
  include_mvc: false
  loop: true

activity_names: { 1: stand, 2: walk, 2.1: walk_turn, 3: stairs_up, 4: stairs_down }

sources:
  - id: hd_emg
    modality: hd_emg
    chunk_size: 100
    generator: rrd_replay

models:
  - id: hd_emg
    type: torch
    active: true
    inputs: [hd_emg]
    checkpoint: /home/swag/Desktop/SWAG_Project/SampleData/SampleIntegrationData/SampleIntegrationData/SWAG-TrainedModels/Integration_models/HD_EMG/CustomResNet_Day_1-Day_2-Day_3-Day_7_20260614_132709/100
    arch: CustomResNet
    window: { window_size: 100, hop: 95 }
    infer_rate_hz: 20
    device: cuda:0
    smoothing:
      method: majority
      window: 7
      min_confidence: 0.5
