# Multi-device: simulate 3 HD-EMG units + the (already-multi) BP-EMG & IMU,
# all streamed from the real RRD dataset, feeding TWO concurrent models.
transport:
  kind: inproc

run:
  duration_s: 6.0
  mode: process

dataset:
  root: /vol/storage/common/SWAG/RRD
  subject: MP301
  days: Day_1 #all
  trials: [1,2] #all
  activities: [1, 2, 2.1, 3, 4]   # intent classes to stream / classify
  loop: true

sources:
  # The dataset has ONE HD-EMG grid; simulate 3 independent devices.
  # count: 3 -> hd_emg_0/1/2, each its own process replaying the same selection.
  - id: hd_emg
    modality: hd_emg
    count: 3              # -> hd_emg_0, hd_emg_1, hd_emg_2 (referenced by the models)
    chunk_size: 100

  # Bipolar EMG (16 ch) — MP301 has all three modalities (AM muscle set).
  - id: bp_emg
    modality: bp_emg
    chunk_size: 100
    subject: MP301

  # IMU suite (66 ch) — already multi-channel, one device.
  - id: imu
    modality: imu
    chunk_size: 100
    # Example of streaming a DIFFERENT selection for this device:
    # subject: MP202
    # trials: [1, 2, 3]

models:
  # Model A: HD-EMG-only classifier, consumes one simulated HD-EMG device.
  - id: hd_emg_classifier
    type: stub
    active: true
    inputs: [hd_emg_0]
    window: { window_size: 100, hop: 50 }
    infer_rate_hz: 20
    device: cpu
    options: { mode: energy }

  # Model B: multimodal fusion (HD-EMG + BP-EMG + IMU), per-modality windows.
  - id: fusion_classifier
    type: stub
    active: true
    inputs: [hd_emg_1, bp_emg, imu]
    window: { window_size: 100, hop: 50 }
    infer_rate_hz: 10
    device: cpu
    options: { mode: energy, latency_ms: 2 }
